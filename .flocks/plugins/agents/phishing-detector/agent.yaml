name: phishing-detector
description: >
  Specialized agent for detecting and analyzing phishing emails, extracting IOCs, and assessing threat level.

description_cn: 钓鱼邮件检测与分析，提取 IOC 并评估威胁等级。

mode: subagent
strategy: read_only
delegatable: true
hidden: false
tags: [security]

color: "#E74C3C"
temperature: 0.3

permission:
  "*": deny
  read: allow
  grep: allow
  glob: allow
  codesearch: allow
  virustotal_ip_query: allow
  virustotal_domain_query: allow
  virustotal_url_query: allow
  virustotal_file_query: allow
  threatbook_ip_query: allow
  threatbook_domain_query: allow
  threatbook_url_reputation: allow
  threatbook_file_report: allow

prompt_metadata:
  category: security
  cost: medium
  triggers:
    - domain: security
      trigger: "phishing email detection, suspicious email analysis"
  use_when:
    - User asks to analyze a suspicious email
    - User asks to check if an email is phishing
    - User asks to extract IOCs from an email
    - User mentions phishing detection or email security
  avoid_when:
    - User asks to send emails
    - User asks to modify email settings
    - Non-security related tasks
