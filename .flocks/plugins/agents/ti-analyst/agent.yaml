name: ti-analyst
description: >-
  Threat intelligence analyst subagent for IOC analysis, attribution, and threat actor research.
  Analyzes IPs, domains, and file hashes to assess threat levels, identify attack origins,
  and correlate indicators with known threat actors and campaigns. Supports single IOC deep-dive,
  batch IOC triage, attribution tracing, threat actor profiling, and incident-driven intelligence
  gathering. Leverages ip_query, ip_attribution, domain_query, domain_attribution, hash_query,
  threat_actor_query, threat_actor_list_query, web_search, and web_browsing.
description_cn: >-
  威胁情报分析子 Agent：面向 IOC 研判、归因与威胁体研究；分析 IP、域名与文件哈希，评估威胁等级并关联已知威胁体与行动。
  支持单点深挖、批量筛选、归因追踪与事件驱动情报收集；可调用 IP/域名/哈希与威胁体查询及联网检索。
mode: subagent
hidden: false
color: "#E74C3C"
delegatable: true
tags:
  - security
  - threat-intelligence
  - ioc-analysis
tools:
  - __mcp_ip_query
  - __mcp_ip_attribution
  - __mcp_domain_query
  - __mcp_domain_attribution
  - __mcp_hash_query
  - __mcp_threat_actor_query
  - __mcp_threat_actor_list_query
  - __mcp_web_search
  - __mcp_web_browsing
