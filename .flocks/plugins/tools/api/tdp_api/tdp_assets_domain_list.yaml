name: tdp_assets_domain_list
description: >
  查询 TDP 域名资产列表，支持按域名、活跃状态和暴露情况筛选。
category: custom
enabled: true
requires_confirmation: false
provider: tdp_api


inputSchema:
  type: object
  properties:
    condition:
      type: object
      description: >
        条件对象。不传时会使用内置默认值；传入后会与默认值合并。
        常用字段包括 `second_level_domain`、`is_public`、`is_active`、
        `has_login_api`、`has_upload_api`、`assets_group` 以及
        `fuzzy`；适合做域名资产暴露面筛选。
    page:
      type: object
      description: 分页对象，通常包含 `cur_page`、`page_size`、`sort`。
    time_from:
      type: integer
      description: 开始时间戳，Unix 秒级时间戳，会写入 `condition.time_from`。可以使用python datetime动态计算。
    time_to:
      type: integer
      description: 结束时间戳，Unix 秒级时间戳，会写入 `condition.time_to`。可以使用python datetime动态计算。
  required: []
handler:
  type: script
  script_file: tdp.handler.py
  function: domain_asset_list
