name: tdp_cloud_facilities
description: >
  查询 TDP 云服务相关数据。默认返回访问源主机列表，也可通过 action 切换到访问源详情、实例列表和实例访问详情。
category: custom
enabled: true
requires_confirmation: false
provider: tdp_api

inputSchema:
  type: object
  properties:
    action:
      type: string
      description: >
        云服务子接口动作。各动作都会自动补齐 condition.time_from、
        condition.time_to 和默认分页排序；其中 `assets_info`
        额外要求传 `source_ip`。
      enum: [access_source, assets_info, instance_list, instance_access_list]
      default: access_source
    condition:
      type: object
      description: >
        条件对象。常用字段包括 `cloud_vendor`、`cloud_service_class`、
        `cloud_service`、`cloud_instance`、`fuzzy`；不同 action
        使用的字段不同，时间范围会自动写入 `condition.time_from`
        和 `condition.time_to`。
    page:
      type: object
      description: 分页对象，通常包含 `cur_page`、`page_size`、`sort`。
    time_from:
      type: integer
      description: 开始时间戳，Unix 秒级时间戳，会写入 `condition.time_from`。可以使用python datetime动态计算。
    time_to:
      type: integer
      description: 结束时间戳，Unix 秒级时间戳，会写入 `condition.time_to`。可以使用python datetime动态计算。
    source_ip:
      type: string
      description: 访问源 IP，`assets_info` 动作必填；用于查看某个访问源主机的云服务访问详情。
  required: []
handler:
  type: script
  script_file: tdp.handler.py
  function: cloud_service
