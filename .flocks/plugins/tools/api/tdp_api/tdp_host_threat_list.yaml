name: tdp_host_threat_list
description: >
  查询 TDP 告警主机相关数据。默认返回告警主机汇总，也可通过 action 切换到主机下的威胁事件列表。
category: custom
enabled: true
requires_confirmation: false
provider: tdp_api

inputSchema:
  type: object
  properties:
    action:
      type: string
      description: >
        告警主机子接口动作。`summary` 会自动补齐默认时间范围、威胁性质和分页；
        `events` 除默认时间范围与分页外，还要求传入 `asset_machine`，
        级联场景可额外传 `device_id`。
      enum: [summary, events]
      default: summary
    condition:
      type: object
      description: >
        条件对象。`summary` 常用 `severity`、`threat_characters`、
        `direction`、`threat_type`、`fuzzy`；其中 `direction`
        常见值为 `in`、`out`、`lateral`，`severity` 取值 0-4。
        `events` 可补充 `severity`、`threat_type`、`disposal_status`
        等筛选，根级 `asset_machine` / `device_id` 会自动写入
        `condition`。
    page:
      type: object
      description: 分页对象；通常包含 `cur_page`、`page_size`、`sort`。不传时接口一般返回第一页默认条数。
    time_from:
      type: integer
      description: 开始时间戳，Unix 秒级时间戳，会写入 `condition.time_from`。可以使用python datetime动态计算。
    time_to:
      type: integer
      description: 结束时间戳，Unix 秒级时间戳，会写入 `condition.time_to`。可以使用python datetime动态计算。
    asset_machine:
      type: string
      description: 资产机器标识，`events` 动作必填；应从 `summary` 结果中的主机标识字段获取。
    device_id:
      type: string
      description: 设备 ID，级联平台场景使用；非级联平台通常可省略。
  required: []
handler:
  type: script
  script_file: tdp.handler.py
  function: threat_host_list
