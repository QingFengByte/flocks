name: tdp_interface_list
description: >
  查询 TDP API 接口列表，支持按域名、方法和敏感标签筛选。
category: custom
enabled: true
requires_confirmation: false
provider: tdp_api


inputSchema:
  type: object
  properties:
    condition:
      type: object
      description: >
        条件对象。不传时会使用内置默认值；传入后会与默认值合并。
        常用字段包括 `host`、`methods`、`privacy_tags`、`tags`、
        `is_public`、`has_interface`、`is_encrypted` 以及
        `fuzzy`；适合筛选 API 接口、敏感信息暴露和请求方法。
    page:
      type: object
      description: 分页对象，通常包含 `cur_page`、`page_size`、`sort`。
    time_from:
      type: integer
      description: 开始时间戳，Unix 秒级时间戳，会写入 `condition.time_from`。可以使用python datetime动态计算。
    time_to:
      type: integer
      description: 结束时间戳，Unix 秒级时间戳，会写入 `condition.time_to`。可以使用python datetime动态计算。
  required: []
handler:
  type: script
  script_file: tdp.handler.py
  function: api_list
