name: tdp_interface_risk_list
description: >
  查询 TDP API 风险列表，适合排查注入、敏感接口等风险。
category: custom
enabled: true
requires_confirmation: false
provider: tdp_api


inputSchema:
  type: object
  properties:
    condition:
      type: object
      description: >
        条件对象。不传时会使用内置默认值；传入后会与默认值合并。
        常用字段包括 `api_risk_type`、`fuzzy`、`assets_group`。
        其中 `api_risk_type` 用于限定风险类型，`fuzzy`
        一般为 `{keyword, fieldlist}` 结构，适合按 URL、标题或接口关键字搜索。
    page:
      type: object
      description: 分页对象，通常包含 `cur_page`、`page_size`、`sort`。
    time_from:
      type: integer
      description: 开始时间戳，Unix 秒级时间戳，会写入 `condition.time_from`。可以使用python datetime动态计算。
    time_to:
      type: integer
      description: 结束时间戳，Unix 秒级时间戳，会写入 `condition.time_to`。可以使用python datetime动态计算。
  required: []
handler:
  type: script
  script_file: tdp.handler.py
  function: api_risk_list
