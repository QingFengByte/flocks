name: tdp_login_weakpwd_list
description: >
  查询 TDP 弱口令列表，可结合登录入口和结果条件筛选。
category: custom
enabled: true
requires_confirmation: false
provider: tdp_api


inputSchema:
  type: object
  properties:
    condition:
      type: object
      description: >
        条件对象。不传时会使用内置默认值；传入后会与默认值合并。
        常用字段包括 `result`、`app_class`、`is_plaintext`、
        `assets_group`、`fuzzy`。其中 `result` 常见值为
        `success`、`failed`、`unknown`。
    page:
      type: object
      description: 分页对象，通常包含 `cur_page`、`page_size`，必要时可补排序信息。
    time_from:
      type: integer
      description: 开始时间戳，Unix 秒级时间戳，会写入 `condition.time_from`。可以使用python datetime动态计算。
    time_to:
      type: integer
      description: 结束时间戳，Unix 秒级时间戳，会写入 `condition.time_to`。可以使用python datetime动态计算。
  required: []
handler:
  type: script
  script_file: tdp.handler.py
  function: weak_password_list
