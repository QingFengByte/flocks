name: tdp_machine_asset_list
description: >
  查询 TDP 服务资产相关接口。默认返回全部服务列表，也可通过 action 切换到主机资产视图或 Web 应用框架列表。
category: custom
enabled: true
requires_confirmation: false
provider: tdp_api


inputSchema:
  type: object
  properties:
    action:
      type: string
      description: >
        服务资产子接口动作。`service_list` / `host_asset_list`
        会补默认 `condition` 和分页；`web_app_framework_list` 会额外默认
        `condition.af_class=web_application` 与按最近发现时间排序。
      enum: [service_list, host_asset_list, web_app_framework_list]
      default: service_list
    condition:
      type: object
      description: >
        条件对象。常用筛选包括 `fuzzy`、`service`、`service_class`、
        `asset_section`、`is_public`、`is_active`。
    page:
      type: object
      description: 分页对象。
  required: []
handler:
  type: script
  script_file: tdp.handler.py
  function: service_asset_list
