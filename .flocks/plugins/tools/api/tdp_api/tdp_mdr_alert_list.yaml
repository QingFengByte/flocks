name: tdp_mdr_alert_list
description: >
  查询 TDP 的 MDR 告警研判相关接口。默认返回研判结果列表，也可通过 action 切换到指标汇总。
category: custom
enabled: true
requires_confirmation: false
provider: tdp_api

inputSchema:
  type: object
  properties:
    action:
      type: string
      description: >
        MDR 子接口动作。`indicator` 会自动补齐
        `condition.time_from`、`condition.time_to`；`list`
        会额外补齐默认分页和按 `alert_judge_time` 倒序排序。
      enum: [indicator, list]
      default: list
    condition:
      type: object
      description: >
        条件对象。`list` 常用 `section_list`、`threat_severity`、
        `judge_result_status`、`fuzzy`；其中 `section_list`
        常用于区分终端/服务器，`threat_severity` 取值通常为 0-4，
        `judge_result_status` 常见值为 1=处理中、2=已处理。
    page:
      type: object
      description: 分页对象，主要用于 `list`；通常包含 `cur_page`、`page_size`、`sort`，默认按 `alert_judge_time` 倒序。
    time_from:
      type: integer
      description: 开始时间戳，Unix 秒级时间戳，会写入 `condition.time_from`。可以使用python datetime动态计算。
    time_to:
      type: integer
      description: 结束时间戳，Unix 秒级时间戳，会写入 `condition.time_to`。可以使用python datetime动态计算。
  required: []
handler:
  type: script
  script_file: tdp.handler.py
  function: mdr_alert_list
