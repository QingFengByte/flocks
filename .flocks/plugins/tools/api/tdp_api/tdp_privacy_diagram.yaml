name: tdp_privacy_diagram
description: >
  查询 TDP 明文敏感信息拓扑概览，返回标签、站点、接口和访问源关系。
category: custom
enabled: true
requires_confirmation: false
provider: tdp_api


inputSchema:
  type: object
  properties:
    condition:
      type: object
      description: >
        条件对象。不传时会使用内置默认值；传入后会与默认值合并。
        常用字段包括 `itag`、`methods`、`assets_group`、
        `fuzzy_url_path`、`fuzzy_url_host`、`fuzzy_src_ip`。
        其中 `itag` 常见值包括 `phone`、`email`、`identify`、
        `card`，`methods` 为 HTTP 方法列表。
    time_from:
      type: integer
      description: 开始时间戳，Unix 秒级时间戳，会写入 `condition.time_from`。可以使用python datetime动态计算。
    time_to:
      type: integer
      description: 结束时间戳，Unix 秒级时间戳，会写入 `condition.time_to`。可以使用python datetime动态计算。
  required: []
handler:
  type: script
  script_file: tdp.handler.py
  function: privacy_overview
