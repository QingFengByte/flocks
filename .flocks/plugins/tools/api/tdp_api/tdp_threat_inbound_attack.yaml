name: tdp_threat_inbound_attack
description: >
  查询 TDP 外部攻击相关数据，当前提供外部攻击严重性分布统计。
category: custom
enabled: true
requires_confirmation: false
provider: tdp_api

inputSchema:
  type: object
  properties:
    condition:
      type: object
      description: >
        条件对象。不传时会使用内置默认值；传入后会与默认值合并。
        常用字段包括 `severity`、`result_list`、`cascade_asset_group`
        和 `fuzzy`。其中 `severity` 取值 0-4，`result_list`
        常见值为 `success`、`failed`、`unknown`；`fuzzy`
        通常为 `{keyword, fieldlist}` 结构，fieldlist 常见固定值为
        `["threat.name","external_ip","machine","assets.name","data"]`。
    time_from:
      type: integer
      description: 开始时间戳，Unix 秒级时间戳，会写入 `condition.time_from`。可以使用python datetime动态计算。
    time_to:
      type: integer
      description: 结束时间戳，Unix 秒级时间戳，会写入 `condition.time_to`。可以使用python datetime动态计算。
  required: []
handler:
  type: script
  script_file: tdp.handler.py
  function: inbound_attack
