name: urlscan_available_countries
description: >
  Retrieve the list of countries available for scanning using the Scan API.
  Use this to check which geographic locations can be specified for scans.
category: custom
enabled: true
requires_confirmation: false
provider: urlscan

inputSchema:
  type: object
  properties: {}

handler:
  type: http
  method: GET
  url: "{base_url}/api/v1/availableCountries"
  timeout: 30

response:
  extract: ""
