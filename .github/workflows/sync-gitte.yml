name: Sync GitHub Release to Gitee

on:
  release:
    types: [published]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync GitHub Release to Gitee
        uses: trustedinster/sync-release-gitee@v1.3
        with:
          gitee_owner: flocks
          gitee_repo: flocks
          gitee_token: ${{ secrets.GITEE_TOKEN }}
          github_owner: AgentFlocks
          github_repo: flocks
          gitee_upload_retry_times: 3
          debug: false